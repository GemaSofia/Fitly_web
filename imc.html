    <section class="imc-section">
        <h2>Calculadora de IMC</h2>

        <form id="formIMC">

        </form>

        <div id="resultado"></div>

            <img src="img/benef1.png" class="benef-icon">

            <p>Información clara, sin términos complicados.</p>
        </div>
    </section>
